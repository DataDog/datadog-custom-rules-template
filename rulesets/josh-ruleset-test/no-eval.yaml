name: no-eval
short_description: use of eval can be insecure
description: |-
  `eval()` executes arbitrary Python expressions and is unsafe when passed unsanitized input.
  Prefer `ast.literal_eval()` for safely evaluating literals, or restructure the code to
  avoid dynamic evaluation entirely. See [CWE-94](https://cwe.mitre.org/data/definitions/94.html).
category: SECURITY
severity: WARNING
language: PYTHON
checksum: ""
cwe: "94"
arguments: []
tree_sitter_query: |-
  (expression_statement
    (call
      function: (identifier) @functionName
      (#eq? @functionName "eval")
    )
  )
code: |-
  function visit(node, filename, code) {
    const functionNameNode = node.captures["functionName"];
    if (!functionNameNode) return;
    const functionName = getCodeForNode(functionNameNode, code);
    if (functionName !== "eval") return;

    const error = buildError(
      functionNameNode.start.line,
      functionNameNode.start.col,
      functionNameNode.end.line,
      functionNameNode.end.col,
      "do not use eval — it executes arbitrary code and is unsafe with untrusted input",
      "WARNING",
      "SECURITY"
    );

    const fix = buildFix("replace with ast.literal_eval", [
      buildEditUpdate(
        functionNameNode.start.line,
        functionNameNode.start.col,
        functionNameNode.end.line,
        functionNameNode.end.col,
        "literal_eval"
      ),
      buildEditAdd(1, 1, "from ast import literal_eval\n"),
    ]);

    addError(error.addFix(fix));
  }
tests:
  - filename: compliant.py
    code: |-
      import foo
      foo.eval('[1, 2, 3]')
    annotation_count: 0
  - filename: compliant_literal_eval.py
    code: |-
      from ast import literal_eval
      literal_eval('[1, 2, 3]')
    annotation_count: 0
  - filename: not_compliant.py
    code: |-
      user_input = input("Enter expression: ")
      result = eval(user_input)
    annotation_count: 1
is_published: true
